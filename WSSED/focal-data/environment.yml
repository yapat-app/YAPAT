name: focal-data-py311
channels:
  - conda-forge
dependencies:
  # Core
  - python=3.11.14
  - pip

  # Numeric / data
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - tqdm

  # Audio
  - soundfile

  # Deep learning (portable, no CUDA hardcode)
  - pytorch
  - torchaudio
  - torchvision
  - torchmetrics

  # Visualization / GUI-related imports used in repo
  - matplotlib
  - seaborn
  - tk

  # Experiment tracking used by some training scripts
  - mlflow

  # Packages not consistently available as conda-forge builds
  - pip:
      - birdnet-analyzer
      - scikit-multilearn

# Create with:
#   conda env create -f environment.yml
